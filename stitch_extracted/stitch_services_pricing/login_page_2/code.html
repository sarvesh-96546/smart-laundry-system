<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center overflow-hidden selection:bg-primary/30">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 z-0 mesh-gradient"></div>
<div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full fabric-glow blur-[100px] z-0"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full fabric-glow blur-[100px] z-0"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[1440px] px-6 flex flex-col items-center">
<!-- Branding Header -->
<header class="mb-12 text-center">
<div class="inline-flex items-center gap-3 mb-4">
<div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-[0_0_30px_rgba(143,245,255,0.3)]">
<span class="material-symbols-outlined text-surface text-3xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tighter text-primary uppercase font-headline">Pristine Flow</h1>
</div>
<p class="text-on-surface-variant font-medium tracking-wide text-sm uppercase opacity-80">Digital Fabric Alchemy</p>
</header>
<!-- Login Card -->
<div class="w-full max-w-[440px] glass-panel rounded-[2rem] p-10 shadow-[0_40px_80px_rgba(0,0,0,0.5)] border border-outline-variant/10 relative overflow-hidden group">
<!-- Inner Card Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
<div class="relative z-10">
<h2 class="text-3xl font-bold font-headline mb-2 text-on-surface">System Access</h2>
<p class="text-on-surface-variant text-sm mb-10 leading-relaxed">Enter your credentials to manage the industrial washing ecosystem.</p>
<form class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-[0.15em] text-on-surface-variant uppercase ml-1">Operator Identity</label>
<div class="relative group/input">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">account_circle</span>
</div>
<input class="w-full bg-surface-container-highest/40 border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/50 transition-all duration-300" placeholder="Username or Email" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[10px] font-bold tracking-[0.15em] text-on-surface-variant uppercase">Security Key</label>
<a class="text-[10px] font-bold tracking-widest text-secondary hover:text-primary transition-colors uppercase" href="#">Forgot?</a>
</div>
<div class="relative group/input">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="w-full bg-surface-container-highest/40 border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/50 transition-all duration-300" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded bg-surface-container-highest border-outline-variant/30 text-primary focus:ring-offset-background focus:ring-primary/50 cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant cursor-pointer select-none" for="remember">Keep session active for 24 hours</label>
</div>
<!-- Login Button -->
<a class="w-full group/btn relative mt-4 block text-center" href="{{DATA:SCREEN:SCREEN_14}}">
<div class="absolute -inset-1 bg-gradient-to-r from-primary to-secondary rounded-xl blur opacity-25 group-hover/btn:opacity-60 transition duration-500"></div>
<div class="relative flex items-center justify-center gap-3 w-full py-4 bg-gradient-to-r from-primary to-secondary text-surface font-bold rounded-xl active:scale-[0.98] transition-all duration-200">
<span class="uppercase tracking-widest text-xs">Initialize Login</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</div>
</a>
</form>
<!-- Footer Links -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-xs text-on-surface-variant">
                        New operator? <a class="text-primary font-bold hover:underline transition-all" href="#">Request Access Portal</a>
</p>
</div>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="mt-12 flex items-center gap-8 opacity-40">
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold tracking-[0.2em] text-outline uppercase mb-2">Protocol</span>
<span class="text-xs text-on-surface font-mono">TLS 1.3 SECURED</span>
</div>
<div class="w-px h-8 bg-outline-variant/20"></div>
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold tracking-[0.2em] text-outline uppercase mb-2">Node</span>
<span class="text-xs text-on-surface font-mono">LUMINA-WASH-04</span>
</div>
</div>
</main>
<!-- Visual Alchemy Graphic (Floating Abstract) -->
<div class="fixed top-1/2 left-[10%] -translate-y-1/2 hidden xl:block opacity-20 pointer-events-none">
