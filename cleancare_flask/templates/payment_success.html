{% extends 'customer_base.html' %}
{% block title %}Payment Successful — CleanCare{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-16">
    <div class="glass rounded-2xl overflow-hidden fade-up">
        <div class="px-8 py-10 text-center space-y-4">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto pulse-ring"
                 style="--ring-color:rgba(34,197,94,.3)">
                <i class="fa-solid fa-circle-check text-green-400 text-4xl"></i>
            </div>
            <h1 class="text-2xl font-black">Payment Successful!</h1>
            <p class="text-white/50">Your payment has been confirmed. Your laundry is in safe hands!</p>

            <div class="bg-green-500/10 border border-green-500/20 rounded-xl p-4 text-left">
                <div class="text-xs text-white/40 mb-1 uppercase tracking-wider">Order ID</div>
                <div class="font-mono font-bold text-green-400 text-xl">{{ order_id }}</div>
            </div>

            <div class="flex flex-col gap-3 pt-2">
                <a href="{{ url_for('index') }}?order_id={{ order_id }}"
                   class="btn-gold py-3 px-6 rounded-xl w-full flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> Track My Order
                </a>
                <a href="{{ url_for('index') }}"
                   class="text-white/30 hover:text-white/60 text-sm transition-colors flex items-center justify-center gap-1">
                    <i class="fa-solid fa-arrow-left text-xs"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
