{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16 fade-in">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="px-8 py-10">
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-sm">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Staff Access</h1>
                <p class="text-slate-500 mt-2">Sign in to manage laundry orders</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2"><i class="fa-solid fa-user mr-1"></i>
                        Username</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all placeholder:text-slate-400"
                        placeholder="admin or staff">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2"><i class="fa-solid fa-lock mr-1"></i>
                        Password</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all placeholder:text-slate-400"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl transition-colors shadow-md focus:ring-2 focus:ring-slate-900 focus:ring-offset-2 flex justify-center items-center gap-2">
                    Start Session <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
        <div class="bg-slate-50 py-4 px-8 border-t border-slate-100 text-center">
            <a href="{{ url_for('index') }}"
                class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">
                &larr; Back to Order Tracking
            </a>
        </div>
    </div>
</div>
{% endblock %}
